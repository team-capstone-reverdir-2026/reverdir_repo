spring:
  application:
    name: to-manito

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tomanito?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mvc:
    cors:
      allowed-origins: "*"

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000      # 1시간 (밀리초)
  refresh-token-expiration: 2592000000  # 30일 (밀리초)

google:
  gemini:
    api:
      key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash-lite